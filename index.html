    const FooterContactCard = ({ title, children }) => (
      <div data-role="footer-contact-card" className="grid grid-cols-[auto_1fr] items-start gap-3 rounded-lg border border-slate-800 bg-slate-900/70 px-3 py-2 text-xs leading-relaxed">

    const ScrollToTopButton = () => {
      const [showScrollTop, setShowScrollTop] = useState(false);

      useEffect(() => {
        const handleScroll = () => setShowScrollTop(window.scrollY > 480);
        handleScroll();
        window.addEventListener('scroll', handleScroll, { passive: true });
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const scrollToTop = () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      return (
        <button
          type="button"

    // --- 3. Products Spec Section (Grouped Search & Filters) ---
    function ProductsSpecSection() {
      const [searchTerm, setSearchTerm] = useState('');
      const [selectedWatt, setSelectedWatt] = useState('All');
      const [selectedKelvin, setSelectedKelvin] = useState('All');
      const [expandedGroups, setExpandedGroups] = useState({});

      const wattOptions = [...new Set(mbmProducts.map(p => p.watt).filter(w => w !== null))].sort((a, b) => a - b);
      const kelvinOptions = [...new Set(mbmProducts.map(p => p.kelvin).filter(k => k !== null))].sort();

      const normalizeProductName = (name) => name
        .replace(/\s*لون\s*\d+\s*$/g, '')
        .replace(/\s*لون\d+\s*$/g, '')
        .replace(/\s{2,}/g, ' ')
        .trim();

      const getItemCategoryCode = (itemNumber) => {
        const parts = (itemNumber || '').split('-').filter(Boolean);
        return parts.length >= 4 ? parts.slice(0, 3).join('-') : itemNumber || 'غير مصنف';
      };

      const categoryTitlesByCode = {
        '07-001-14': 'قواعد اضاءة كوب',
        '07-001-01': 'قواعد اضاءة بنل',
        '07-001-16': 'قواعد اضاءة تراك لايت',
        '07-001-15': 'قواعد اضاءة مانع توهج',
        '07-001-06': 'قواعد اضاءة سبوت لايت',
        '07-001-17': 'قواعد اضاءة ماجناتك',
        '07-001-18': 'ملحقات وتراكات ماجنتك',
      };

      const categoryNamePrefixes = [
        'قواعد اضاءة كوب',
        'قواعد اضاءة بنل',
        'قواعد اضاءة تراك لايت',
        'قواعد اضاءة مانع توهج',
        'قواعد اضاءة سبوت لايت',
        'قواعد اضاءة ماجناتك متحرك',
        'قواعد اضاءة ماجناتك',
      ];

      const getCategoryTitle = (product, categoryCode) => {
        const normalizedName = normalizeProductName(product.item_name);
        const namePrefix = categoryNamePrefixes.find(prefix => normalizedName.startsWith(prefix));
        if (namePrefix) return namePrefix.replace(' متحرك', '');
        if (categoryTitlesByCode[categoryCode]) return categoryTitlesByCode[categoryCode];
        if (normalizedName.includes('درايفر') || normalizedName.includes('محول طاقة')) return 'درايفرات 48V';
        if (normalizedName.includes('تراك')) return 'تراكات وملحقات التراك';
        if (normalizedName.includes('وصلة') || normalizedName.includes('توصيلة')) return 'وصلات التراك';
        if (normalizedName.includes('مشبك') || normalizedName.includes('صفيحة')) return 'ملحقات تثبيت التراك';
        if (normalizedName.includes('سلك')) return 'أسلاك التوصيل';
        return normalizedName.replace(/\s+\d+\s*وات.*$/g, '').replace(/\s+موديل\s+.*$/g, '').trim() || categoryCode;
      };

      const groupProductsByCategory = (products) => {
        const groups = [];
        const groupMap = {};

        products.forEach(product => {
          const categoryCode = getItemCategoryCode(product.item_number);
          const key = categoryCode;
          if (!groupMap[key]) {
            groupMap[key] = {
              key,
              categoryCode,
              title: getCategoryTitle(product, categoryCode),
              mainProduct: product,
              products: [],
            };
            groups.push(groupMap[key]);
          }
          groupMap[key].products.push(product);
        });

        return groups;
      };

      const filteredProducts = mbmProducts.filter(p => {
        const term = searchTerm.toLowerCase();
        const matchesSearch = p.item_name.toLowerCase().includes(term) ||
          p.item_number.toLowerCase().includes(term) ||
          p.model.toLowerCase().includes(term);

        const matchesWatt = selectedWatt === 'All' || (p.watt !== null && p.watt.toString() === selectedWatt);
        const matchesKelvin = selectedKelvin === 'All' || (p.kelvin !== null && p.kelvin === selectedKelvin);

        return matchesSearch && matchesWatt && matchesKelvin;
      });

      const groupedProducts = groupProductsByCategory(filteredProducts);
      const expandAllGroups = () => {
        setExpandedGroups(Object.fromEntries(groupedProducts.map(group => [group.key, true])));
      };
      const collapseAllGroups = () => {
        setExpandedGroups({});
      };
      const toggleGroup = (groupKey) => {
        setExpandedGroups(current => ({
          ...current,
          [groupKey]: current[groupKey] !== true,
        }));
      };
      const isGroupExpanded = (groupKey) => expandedGroups[groupKey] === true;

      const renderProductPower = (product) => (
        product.watt !== null ? (
          <div className="flex flex-wrap items-center gap-2">
            <span className="text-white font-mono font-bold">{product.watt_text || `${product.watt} وات`}</span>
            {product.lumen !== "-" && (
              <>
                <span className="text-xs text-slate-500">|</span>
                <span className="text-slate-300 font-mono text-sm">{product.lumen} لومن</span>
              </>
            )}
            {product.kelvin && (
              <>
                <span className="text-xs text-slate-500">|</span>
                <span className="text-xs text-slate-400 font-mono">{product.kelvin}</span>
              </>
            )}
          </div>
        ) : (
          <div className="text-slate-500 text-xs italic">لا ينطبق (ملحق)</div>
        )
      );

      return (
        <div className="space-y-6 animate-fadeIn">
          <div className="flex flex-col lg:flex-row justify-between lg:items-end gap-4 mb-2">
            <div>
              <h2 className="text-2xl sm:text-3xl font-bold text-white border-b border-yellow-500 pb-3 inline-block">المنتجات (المواصفات الفنية)</h2>
              <div className="mt-2 text-sm text-slate-400">({groupedProducts.length}) فئة / ({filteredProducts.length}) منتج</div>
            </div>
            <div className="grid grid-cols-2 gap-2 sm:flex sm:justify-end">
              <button
                type="button"
                onClick={expandAllGroups}
                className="min-h-10 rounded-lg border border-yellow-500/40 bg-yellow-500/10 px-4 py-2 text-sm font-bold text-yellow-400 hover:bg-yellow-500 hover:text-slate-950 transition-colors"
              >
                توسيع كل الفئات
              </button>
              <button
                type="button"
                onClick={collapseAllGroups}
                className="min-h-10 rounded-lg border border-slate-600 bg-slate-800 px-4 py-2 text-sm font-bold text-slate-200 hover:bg-slate-700 transition-colors"
              >
                طي كل الفئات
              </button>
            </div>
          </div>

          <div className="bg-slate-800 p-4 sm:p-5 rounded-xl border border-slate-700 shadow-lg grid grid-cols-1 md:grid-cols-[minmax(0,1fr)_12rem_12rem] gap-4 mb-6">
            <div className="flex-1">
              <label className="block text-xs font-bold text-slate-400 mb-2">بحث (اسم الصنف، الموديل، أو رقم الصنف)</label>
              <div className="relative">
                <span className="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-500">🔍</span>
                <input
                  type="text"
                  placeholder="مثال: CY107 أو 07-001..."
                  value={searchTerm}
                  onChange={(e) => setSearchTerm(e.target.value)}
                  className="w-full bg-slate-900 border border-slate-600 rounded-lg py-2.5 pr-10 pl-3 text-white focus:outline-none focus:border-yellow-500 transition-colors"
                />
              </div>
            </div>

            <div className="w-full">
              <label className="block text-xs font-bold text-slate-400 mb-2">تصفية حسب الواط (Watt)</label>
              <select
                value={selectedWatt}
                onChange={(e) => setSelectedWatt(e.target.value)}
                className="w-full bg-slate-900 border border-slate-600 rounded-lg p-2.5 text-white focus:outline-none focus:border-yellow-500 cursor-pointer"
              >
                <option value="All">جميع الاستهلاكات</option>
                {wattOptions.map(w => (
                  <option key={w} value={w.toString()}>{w} وات</option>
                ))}
              </select>
            </div>

            <div className="w-full">
              <label className="block text-xs font-bold text-slate-400 mb-2">تصفية حسب اللون (Kelvin)</label>
              <select
                value={selectedKelvin}
                onChange={(e) => setSelectedKelvin(e.target.value)}
                className="w-full bg-slate-900 border border-slate-600 rounded-lg p-2.5 text-white focus:outline-none focus:border-yellow-500 cursor-pointer"
              >
                <option value="All">جميع الألوان</option>
                {kelvinOptions.map(k => (
                  <option key={k} value={k}>{k}</option>
                ))}
              </select>
            </div>
          </div>

          <div data-role="desktop-product-table" className="hidden lg:block overflow-x-auto rounded-xl border border-slate-700 shadow-xl bg-slate-950">
            <table className="w-full text-right border-collapse">
              <thead>
                <tr className="bg-slate-900 border-b-2 border-yellow-500 text-sm">
                  <th className="p-4 text-slate-300 font-semibold whitespace-nowrap">الصنف والموديل</th>
                  <th className="p-4 text-slate-300 font-semibold">الاستهلاك والإضاءة</th>
                  <th className="p-4 text-slate-300 font-semibold">المواصفات الفنية</th>
                  <th className="p-4 text-slate-300 font-semibold">ميزات إضافية</th>
                </tr>
              </thead>
              <tbody>
                {groupedProducts.map((group, idx) => (
                  <React.Fragment key={group.key}>
                    <tr className={`border-b border-slate-800 ${idx % 2 === 0 ? 'bg-slate-900/70' : 'bg-slate-900/40'}`}>
                      <td className="p-4 align-top">
                        <button
                          type="button"
                          onClick={() => toggleGroup(group.key)}
                          className="w-full flex items-start gap-4 text-right group"
                          aria-expanded={isGroupExpanded(group.key)}
                        >
                          <div className="w-12 h-12 mt-1 bg-slate-800 rounded-lg flex items-center justify-center text-2xl border border-slate-700 shadow-inner shrink-0">
                            {group.mainProduct.icon}
                          </div>
                          <div className="flex-1 min-w-0">
                            <div className="flex flex-wrap items-center gap-2 mb-1.5">
                              <span data-role="group-toggle-indicator" className="text-yellow-500 text-lg leading-none">{isGroupExpanded(group.key) ? '−' : '+'}</span>
                              <span className="font-bold text-white text-sm leading-relaxed">{group.title}</span>
                            </div>
                            <div className="flex flex-wrap gap-2">
                              <span className="text-xs text-yellow-500 font-mono bg-yellow-500/10 px-2 py-0.5 rounded border border-yellow-500/20">الفئة: {group.categoryCode}</span>
                              <span className="text-xs text-slate-300 bg-slate-800 px-2 py-0.5 rounded border border-slate-600">{group.products.length} منتج فرعي</span>
                            </div>
                          </div>
                        </button>
                      </td>
                      <td colSpan={3} className="p-4 align-middle">
                        <div className="text-xs text-slate-500 leading-relaxed">
                          {isGroupExpanded(group.key) ? 'تفاصيل كل منتج فرعي معروضة أسفل الفئة.' : 'قم بتوسيع الفئة لعرض الاستهلاك والمواصفات الفنية لكل منتج فرعي.'}
                        </div>
                      </td>
                    </tr>

                    {isGroupExpanded(group.key) && group.products.map((product) => (
                      <tr key={product.id} className="border-b border-slate-800 bg-slate-950/80 hover:bg-slate-800/70 transition-colors">
                        <td colSpan={4} className="p-0">
                          <div data-role="child-product-row" className="mr-10 pr-5 grid grid-cols-[minmax(260px,1.3fr)_minmax(160px,0.65fr)_minmax(220px,1fr)_minmax(220px,1fr)] gap-3 px-6 py-3 border-r-2 border-yellow-500/40">
                            <div>
                              <div className="text-sm text-slate-100 leading-relaxed">{product.item_name}</div>
                              <div className="mt-1 text-xs text-yellow-500 font-mono"># {product.item_number}</div>
                            </div>
                            <div>{renderProductPower(product)}</div>
                            <div className="text-xs text-slate-400 leading-relaxed">{product.technical_specs}</div>
                            <div className="text-xs text-slate-400 leading-relaxed">{product.features}</div>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </React.Fragment>
                ))}
              </tbody>
            </table>

          </div>

          <div data-role="mobile-product-groups" className="lg:hidden space-y-3">
            {groupedProducts.map((group) => (
              <section key={group.key} className="rounded-xl border border-slate-700 bg-slate-900/80 shadow-lg overflow-hidden">
                <button
                  type="button"
                  onClick={() => toggleGroup(group.key)}
                  className="w-full p-4 text-right"
                  aria-expanded={isGroupExpanded(group.key)}
                >
                  <div className="flex items-start gap-3">
                    <div className="w-11 h-11 bg-slate-800 rounded-lg flex items-center justify-center text-2xl border border-slate-700 shrink-0">
                      {group.mainProduct.icon}
                    </div>
                    <div className="min-w-0 flex-1">
                      <div className="flex items-start gap-2">
                        <span data-role="group-toggle-indicator" className="mt-0.5 text-yellow-500 text-lg leading-none shrink-0">{isGroupExpanded(group.key) ? '−' : '+'}</span>
                        <h3 className="text-sm font-bold text-white leading-relaxed">{group.title}</h3>
                      </div>
                      <div className="mt-2 flex flex-wrap gap-2">
                        <span className="text-xs text-yellow-500 font-mono bg-yellow-500/10 px-2 py-0.5 rounded border border-yellow-500/20">الفئة: {group.categoryCode}</span>
                        <span className="text-xs text-slate-300 bg-slate-800 px-2 py-0.5 rounded border border-slate-600">{group.products.length} منتج فرعي</span>
                      </div>
                    </div>
                  </div>
                </button>

                {isGroupExpanded(group.key) && (
                  <div className="space-y-3 border-t border-slate-800 bg-slate-950/70 p-3">
                    {group.products.map((product) => (
                      <article key={product.id} data-role="child-product-row" className="mr-5 border-r-2 border-yellow-500/40 bg-slate-900/70 rounded-lg p-3 pr-4">
                        <div className="text-sm text-slate-100 leading-relaxed">{product.item_name}</div>
                        <div className="mt-1 text-xs text-yellow-500 font-mono"># {product.item_number}</div>
                        <div className="mt-3 grid grid-cols-1 gap-3">
                          <div>{renderProductPower(product)}</div>
                          <div className="text-xs text-slate-400 leading-relaxed">{product.technical_specs}</div>
                          <div className="text-xs text-slate-500 leading-relaxed">{product.features}</div>
                        </div>
                      </article>
                    ))}
                  </div>
                )}
              </section>
            ))}
          </div>

          {filteredProducts.length === 0 && (
            <div className="rounded-xl border border-slate-700 bg-slate-950 p-8 sm:p-12 text-center flex flex-col items-center justify-center">
              <span className="text-5xl mb-4 opacity-50">🔍</span>
              <h3 className="text-xl font-bold text-white mb-2">لم يتم العثور على منتجات</h3>
              <p className="text-slate-400">لا يوجد منتج يطابق خيارات البحث الحالية.</p>
              <button
                onClick={() => { setSearchTerm(''); setSelectedWatt('All'); setSelectedKelvin('All'); }}
                className="mt-4 bg-slate-800 hover:bg-slate-700 text-yellow-500 px-4 py-2 rounded-lg transition-colors border border-slate-600"
              >
                إعادة ضبط الفلاتر
              </button>
            </div>
          )}
        </div>
      );
    }

    // --- 4. Smart Systems Section ---
    function SmartSystemSection() {
      return (
        <div className="space-y-8 animate-fadeIn">
          <div className="bg-gradient-to-br from-slate-900 to-black p-8 rounded-2xl border border-slate-700 relative overflow-hidden">
            <div className="absolute top-0 right-0 w-full h-full opacity-10 pointer-events-none" style={{ backgroundImage: 'linear-gradient(90deg, transparent 99%, #fff 100%)', backgroundSize: '20px 100%' }}></div>

            <div className="relative z-10">
              <h2 className="text-3xl font-bold text-white mb-2">أنظمة المسار المغناطيسي 48V الذكية</h2>
              <p className="text-yellow-500 font-mono text-sm mb-6 tracking-wider">MULTIPLE INTELLIGENT CONTROL METHODS</p>

              <p className="text-slate-300 max-w-3xl leading-relaxed mb-8">
                نظام متكامل يجمع بين الجمال المعماري (Concealed/Surface Tracks) والأمان العالي بجهد (DC48V). يتميز بترقية التجربة المغناطيسية لسهولة الفك والتركيب بدون أدوات (Tool-free)، مع دعم كامل للتحكم الذكي والتعتيم.
              </p>

              <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
                <div className="bg-slate-800/80 p-4 rounded-xl border border-slate-700 text-center hover:border-yellow-500 transition-colors">
                  <div className="text-3xl mb-2">📱</div>
                  <div className="text-sm font-bold text-white">Tuya / Smart Life</div>
                  <div className="text-xs text-slate-400 mt-1">تحكم عبر التطبيق</div>
                </div>
                <div className="bg-slate-800/80 p-4 rounded-xl border border-slate-700 text-center hover:border-yellow-500 transition-colors">
                  <div className="text-3xl mb-2">🗣️</div>
                  <div className="text-sm font-bold text-white">Voice Control</div>
                  <div className="text-xs text-slate-400 mt-1">أوامر صوتية</div>
                </div>
                <div className="bg-slate-800/80 p-4 rounded-xl border border-slate-700 text-center hover:border-yellow-500 transition-colors">
                  <div className="text-3xl mb-2">🎛️</div>
                  <div className="text-sm font-bold text-white">ZigBee Alliance</div>
                  <div className="text-xs text-slate-400 mt-1">ارتباط مباشر بالأنظمة</div>
                </div>
                <div className="bg-slate-800/80 p-4 rounded-xl border border-slate-700 text-center hover:border-yellow-500 transition-colors">
                  <div className="text-3xl mb-2">🛡️</div>
                  <div className="text-sm font-bold text-white">DC48V Safe</div>
                  <div className="text-xs text-slate-400 mt-1">جهد آمن للمس</div>
                </div>
              </div>

              <h3 className="text-xl font-bold text-white mb-4 border-b border-slate-700 pb-2">عائلة وحدات الإضاءة المغناطيسية</h3>
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                <div className="bg-slate-950 p-5 rounded-xl border border-slate-800 relative overflow-hidden group">
                  <div className="absolute top-0 right-0 w-2 h-full bg-blue-500 opacity-50 group-hover:opacity-100 transition-opacity"></div>
                  <h4 className="font-bold text-white mb-1">CXFG20</h4>
                  <div className="text-xs text-blue-400 mb-3">Floodlight Series</div>
                  <p className="text-xs text-slate-400 mb-2">إضاءة عامة بزاوية 120 درجة لإنارة المساحات الواسعة بتجانس تام.</p>
                  <div className="text-[10px] text-slate-500 font-mono">10W / 20W / 40W</div>
                </div>
                <div className="bg-slate-950 p-5 rounded-xl border border-slate-800 relative overflow-hidden group">
                  <div className="absolute top-0 right-0 w-2 h-full bg-yellow-500 opacity-50 group-hover:opacity-100 transition-opacity"></div>
                  <h4 className="font-bold text-white mb-1">CXGS20</h4>
                  <div className="text-xs text-yellow-500 mb-3">Grille Lamp Series</div>
                  <p className="text-xs text-slate-400 mb-2">عدسات شبكية موجهة بزاوية 24 درجة، مثالية لراحة العين (UGR &lt; 15).</p>
                  <div className="text-[10px] text-slate-500 font-mono">6W / 12W / 18W</div>
                </div>
                <div className="bg-slate-950 p-5 rounded-xl border border-slate-800 relative overflow-hidden group">
                  <div className="absolute top-0 right-0 w-2 h-full bg-red-500 opacity-50 group-hover:opacity-100 transition-opacity"></div>
                  <h4 className="font-bold text-white mb-1">CXZD20</h4>
                  <div className="text-xs text-red-400 mb-3">Folding Lamp Series</div>
                  <p className="text-xs text-slate-400 mb-2">إضاءة قابلة للطي والتوجيه الحر لتركيز الضوء على مناطق العرض.</p>
                  <div className="text-[10px] text-slate-500 font-mono">6W / 12W / 18W</div>
                </div>
                <div className="bg-slate-950 p-5 rounded-xl border border-slate-800 relative overflow-hidden group">
                  <div className="absolute top-0 right-0 w-2 h-full bg-green-500 opacity-50 group-hover:opacity-100 transition-opacity"></div>
                  <h4 className="font-bold text-white mb-1">CXDX20</h4>
                  <div className="text-xs text-green-400 mb-3">Suspension Lamp</div>
                  <p className="text-xs text-slate-400 mb-2">وحدات متدلية أنيقة تستخدم فوق الطاولات في المكاتب والمطاعم.</p>
                  <div className="text-[10px] text-slate-500 font-mono">6W / 10W</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // Render Application
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
