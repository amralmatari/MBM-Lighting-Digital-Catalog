      'قواعد اضاءة مانع توهج': './images/قواعد اضاءة مانع توهج.png',
      'قواعد اضاءة سبوت لايت': './images/قواعد اضاءة سبوت لايت.png',

    const categoryNamePrefixes = [
      'قواعد اضاءة كوب',
      'قواعد اضاءة بنل',
      'قواعد اضاءة تراك لايت',

    const productCategoryMeta = {

        label: 'درايفر',

    const normalizeProductName = (name) => String(name || '')
      .replace(/\s*لون\s*\d+\s*$/g, '')
      .replace(/\s*لون\d+\s*$/g, '')
      .replace(/\s{2,}/g, ' ')
      .trim();

    const getItemCategoryCode = (itemNumber) => {
      const parts = (itemNumber || '').split('-').filter(Boolean);
      return parts.length >= 4 ? parts.slice(0, 3).join('-') : itemNumber || 'غير مصنف';
    };

    const getCategoryTitle = (product, categoryCode = getItemCategoryCode(product?.item_number)) => {
      const normalizedName = normalizeProductName(product?.item_name);
      const namePrefix = categoryNamePrefixes.find(prefix => normalizedName.startsWith(prefix));
      if (namePrefix) return namePrefix.replace(' متحرك', '');
      if (categoryTitlesByCode[categoryCode]) return categoryTitlesByCode[categoryCode];
      if (normalizedName.includes('درايفر') || normalizedName.includes('محول طاقة')) return 'درايفرات 48V';
      if (normalizedName.includes('تراك')) return 'تراكات وملحقات التراك';
      if (normalizedName.includes('وصلة') || normalizedName.includes('توصيلة')) return 'وصلات التراك';
      if (normalizedName.includes('مشبك') || normalizedName.includes('صفيحة')) return 'ملحقات تثبيت التراك';
      if (normalizedName.includes('سلك')) return 'أسلاك التوصيل';
      return normalizedName.replace(/\s+\d+\s*وات.*$/g, '').replace(/\s+موديل\s+.*$/g, '').trim() || categoryCode;
    };

    const getCategoryImage = (title) => categoryImagesByTitle[title] || './images/ملحقات وتراكات ماجنتك.jpeg';

    const parseNumericValue = (value) => {
      const matches = String(value ?? '').match(/\d+(?:\.\d+)?/g);
      if (!matches) return 0;
      const numbers = matches.map(Number).filter(number => Number.isFinite(number));
      return numbers.length > 0 ? Math.max(...numbers) : 0;
    };

    const parseLumen = (product) => parseNumericValue(product?.lumen);

    const parseWatt = (product) => {
      if (Number.isFinite(product?.watt)) return Number(product.watt);
      const wattText = `${product?.watt_text || ''} ${product?.item_name || ''}`;
      const match = wattText.match(/(\d+(?:\.\d+)?)\s*وات/);
      return match ? Number(match[1]) : 0;
    };

    const extractProductLumen = (lumenValue) => parseNumericValue(lumenValue);

    const slugifyProductIdentifier = (product) => String(product?.item_number || product?.id || 'product')

    const hasValidLumen = (product) => parseLumen(product) > 0;

      if (matchingRule?.type === 'magnetic_track' && name.includes('تراك لايت')) return 'track_light';
      if (matchingRule) return matchingRule.type;
      const categoryCode = getItemCategoryCode(product?.item_number);
      if (categoryCode === '07-001-14') return 'cup_light';
      if (categoryCode === '07-001-01') return 'panel_light';
      if (categoryCode === '07-001-16') return 'track_light';
      if (categoryCode === '07-001-15') return 'anti_glare';
      if (categoryCode === '07-001-06') return 'spotlight';
      if (categoryCode === '07-001-17') return 'magnetic_light';
      if (categoryCode === '07-001-18') return 'accessory';
      return 'unknown';
    };

    const getNormalizedWattLabel = (product) => {
      const wattValue = parseWatt(product);
      return wattValue > 0 ? `${wattValue} وات` : '';
    };

    const getCatalogDisplayName = (product) => {
      const productType = getProductType(product);
      const meta = productCategoryMeta[productType] || productCategoryMeta.unknown;
      const wattLabel = getNormalizedWattLabel(product);
      const kelvinLabel = product?.kelvin || '';
      const modelLabel = product?.model && product.model !== 'N/A' ? product.model : '';

      if (productType === 'driver') {
        return ['درايفر ماجنتك داخلي', wattLabel].filter(Boolean).join(' - ');
      }

      if (['magnetic_track', 'connector', 'mounting_accessory', 'cable', 'accessory', 'unknown'].includes(productType)) {
        return normalizeProductName(product?.item_name);
      }

      return [
        [meta.label, modelLabel].filter(Boolean).join(' '),
        wattLabel,
        kelvinLabel,
      ].filter(Boolean).join(' - ');
    };

    const getCatalogShortName = (product) => {
      const productType = getProductType(product);
      const meta = productCategoryMeta[productType] || productCategoryMeta.unknown;
      const wattLabel = getNormalizedWattLabel(product);

      if (productType === 'driver') return ['درايفر', wattLabel].filter(Boolean).join(' ');
      if (['magnetic_track', 'connector', 'mounting_accessory', 'cable', 'accessory', 'unknown'].includes(productType)) {
        return normalizeProductName(product?.item_name).replace(/\s{2,}/g, ' ').slice(0, 34);
      }
      return [meta.label, wattLabel].filter(Boolean).join(' ');
    };

    const getExpectedProductImagePath = (product) => `./images/products/${slugifyProductIdentifier(product)}-product.webp`;

    const getExpectedApplicationImagePath = (product) => `./images/applications/${slugifyProductIdentifier(product)}-application.webp`;

    const getProductImagePath = () => catalogImagePlaceholders.product;

    const getApplicationImagePath = () => catalogImagePlaceholders.application;

    const getRecommendedUses = (product) => {
      const productType = getProductType(product);
      return [...(productCategoryMeta[productType]?.recommendedUse || [])];
    };

    const getProductBadges = (product) => {
      const productType = getProductType(product);
      const badges = [];
      const criText = String(product?.cri || '');
      const ugrText = String(product?.ugr || '');
      const validLumen = hasValidLumen(product);
      const calculatorReadiness = getCalculatorReadiness(product);

      if (criText.includes('90')) badges.push('CRI عالي');
      if (ugrText.includes('<19') || ugrText.includes('<16')) badges.push('مانع توهج');
      if (validLumen) badges.push('لومن متوفر');
      if (calculatorReadiness.is_calculator_ready) badges.push('مناسب للحاسبة');
      if (productType === 'driver') badges.push('درايفر');
      if (['connector', 'mounting_accessory', 'cable', 'accessory', 'magnetic_track'].includes(productType)) badges.push('ملحق');
      if (productType === 'track_light') badges.push('تراك لايت');
      if (productType === 'magnetic_light') badges.push('ماجنتك 48V');

      return [...new Set(badges)];
    };

    const getCalculatorReadiness = (product) => {
      const productType = getProductType(product);
      const nonLightingTypes = ['driver', 'magnetic_track', 'connector', 'mounting_accessory', 'cable', 'accessory', 'unknown'];
      const lumenValue = parseLumen(product);
      const wattValue = parseWatt(product);
      const isLightingUnit = !nonLightingTypes.includes(productType);
      const validLumen = lumenValue > 0;

      return {
        is_lighting_unit: isLightingUnit,
        has_valid_lumen: validLumen,
        is_calculator_ready: isLightingUnit && validLumen && wattValue > 0,
        lumen_value: lumenValue,
        watt_value: wattValue,
      };
    };

    const enrichProductForCatalog = (product) => {

      const isAccessory = ['magnetic_track', 'connector', 'mounting_accessory', 'cable', 'accessory', 'unknown'].includes(productType);
      const notes = ['الصورة قيد التحديث.'];

      if (isDriver) {
        notes.push('هذا المنتج درايفر وليس وحدة إضاءة مباشرة.');
      } else if (!calculatorReadiness.is_lighting_unit) {
        notes.push(isTrack ? 'هذا المنتج ملحق/تراك وليس وحدة إضاءة مباشرة.' : 'هذا المنتج ملحق وليس وحدة إضاءة مباشرة.');

        notes.push('يمكن استخدام هذا المنتج لاحقًا في حاسبة عدد وحدات الإضاءة.');
      }

      return {
        ...product,
        display_name: getCatalogDisplayName(product),
        short_name: getCatalogShortName(product),
        catalog_category: productCategoryMeta[productType]?.catalogCategory || getCategoryTitle(product),
        product_type: productType,

        badges: getProductBadges(product),

        is_driver: isDriver,

    function LightingCalculatorSection() {
      const DEFAULT_UF = 0.70;
      const DEFAULT_MF = 0.80;

      const placeLuxLevels = [
        { name: 'غرفة نوم', lux: 150, description: 'إضاءة هادئة ومريحة للراحة' },
        { name: 'مجلس', lux: 200, description: 'إضاءة عامة مناسبة للجلوس' },
        { name: 'صالة', lux: 200, description: 'إضاءة متوازنة للاستخدام اليومي' },
        { name: 'مطبخ', lux: 400, description: 'إضاءة أقوى لتحضير الطعام والعمل' },
        { name: 'مكتب', lux: 400, description: 'إضاءة واضحة للقراءة والعمل' },
        { name: 'محل تجاري', lux: 500, description: 'إضاءة عرض قوية وجاذبة' },
        { name: 'معرض ديكور', lux: 500, description: 'إضاءة تساعد على إظهار الألوان والتفاصيل' },
        { name: 'مخزن', lux: 150, description: 'إضاءة عملية للحركة والتخزين' },
        { name: 'واجهة خارجية', lux: 200, description: 'تقدير أولي حسب هدف الواجهة' },
        { name: 'مطعم أو كافيه', lux: 200, description: 'إضاءة مريحة للأجواء والجلوس' },
      ];

      const extractFirstNumber = (value) => {
        const match = String(value || '').match(/\d+(?:\.\d+)?/);
        return match ? Number(match[0]) : 0;
      };

      const calculatorProducts = mbmProducts.filter(product => (
        extractProductLumen(product.lumen) > 0 && product.watt !== null
      ));

      const [placeType, setPlaceType] = useState(placeLuxLevels[0].name);
      const [areaMode, setAreaMode] = useState('direct');
      const [areaInput, setAreaInput] = useState('20');
      const [lengthInput, setLengthInput] = useState('');
      const [widthInput, setWidthInput] = useState('');
      const [selectedProductId, setSelectedProductId] = useState(calculatorProducts[0]?.id?.toString() || '');

      const selectedPlace = placeLuxLevels.find(place => place.name === placeType) || placeLuxLevels[0];
      const selectedProduct = calculatorProducts.find(product => product.id.toString() === selectedProductId) || calculatorProducts[0];
      const productLumen = selectedProduct ? extractProductLumen(selectedProduct.lumen) : 0;
      const productWatt = selectedProduct?.watt || 0;
      const directArea = Number(areaInput) || 0;
      const dimensionsArea = (Number(lengthInput) || 0) * (Number(widthInput) || 0);
      const area = areaMode === 'dimensions' ? dimensionsArea : directArea;
      const targetLux = selectedPlace.lux;
      const effectiveLumenPerUnit = productLumen * DEFAULT_UF * DEFAULT_MF;
      const requiredLumens = area * targetLux;
      const suggestedUnits = area > 0 && effectiveLumenPerUnit > 0
        ? Math.ceil(requiredLumens / effectiveLumenPerUnit)
        : 0;
      const producedLumens = suggestedUnits * productLumen;
      const totalWatt = suggestedUnits * productWatt;
      const estimatedLux = area > 0
        ? Math.round((suggestedUnits * effectiveLumenPerUnit) / area)
        : 0;
      const luxRatio = targetLux > 0 ? estimatedLux / targetLux : 0;
      const resultStatus = suggestedUnits === 0
        ? 'none'
        : luxRatio < 0.9
          ? 'low'
          : luxRatio <= 1.25
            ? 'good'
            : 'high';
      const highestLumenProduct = calculatorProducts.reduce((best, product) => (
        extractProductLumen(product.lumen) > extractProductLumen(best?.lumen) ? product : best
      ), calculatorProducts[0]);

      const smartWarnings = [];
      if (suggestedUnits > 20) {
        smartWarnings.push({
          title: 'عدد كبير من الوحدات',
          text: `هذا المنتج قد يحتاج عددًا كبيرًا لهذه المساحة. جرّب منتجًا بلومن أعلى. أعلى خيار متوفر حالياً هو ${highestLumenProduct?.item_name || 'غير متوفر'} (${extractProductLumen(highestLumenProduct?.lumen)} لومن).`,
        });
      }
      if (placeType === 'غرفة نوم' && selectedProduct?.kelvin === '6500K') {
        smartWarnings.push({
          title: 'درجة لون باردة',
          text: 'هذه الدرجة بيضاء باردة وقد لا تكون مريحة لغرف النوم. غالباً تكون 3000K أو 4000K أكثر هدوءاً.',
        });
      }
      const criValue = extractFirstNumber(selectedProduct?.cri);
      if ((placeType === 'معرض ديكور' || placeType === 'محل تجاري') && criValue < 90) {
        smartWarnings.push({
          title: 'دقة الألوان',

        });

      );

            <div className="grid grid-cols-1 gap-3 md:grid-cols-3">

          {calculatorProducts.length === 0 ? (
            <div className="rounded-xl border border-slate-700 bg-slate-950 p-8 text-center">

    // --- 4. Products Spec Section (Grouped Search & Filters) ---
    function ProductsSpecSection() {
      const [searchTerm, setSearchTerm] = useState('');
      const [selectedWatt, setSelectedWatt] = useState('All');
      const [selectedKelvin, setSelectedKelvin] = useState('All');
      const [viewMode, setViewMode] = useState('cards');
      const [expandedGroups, setExpandedGroups] = useState({});

      const wattOptions = [...new Set(catalogProducts.map(p => p.watt).filter(w => w !== null))].sort((a, b) => a - b);
      const kelvinOptions = [...new Set(catalogProducts.map(p => p.kelvin).filter(k => k !== null))].sort();

      const renderCategoryImage = (group, sizeClass = 'w-14 h-14') => (
        <div className={`${sizeClass} overflow-hidden rounded-xl border border-slate-600 bg-slate-950 shadow-inner shadow-black/40 shrink-0`}>
          <img
            data-role="category-image"
            src={getCategoryImage(group.title)}
            alt={group.title}
            className="h-full w-full object-contain p-1.5 brightness-110 contrast-110 saturate-110 drop-shadow-[0_8px_18px_rgba(0,0,0,0.55)]"
            loading="lazy"
          />
        </div>
      );

      const groupProductsByCategory = (products) => {
        const groups = [];
        const groupMap = {};

        products.forEach(product => {
          const categoryCode = getItemCategoryCode(product.item_number);
          const key = categoryCode;
          if (!groupMap[key]) {
            groupMap[key] = {
              key,
              categoryCode,
              title: getCategoryTitle(product, categoryCode),
              mainProduct: product,
              products: [],
            };
            groups.push(groupMap[key]);
          }
          groupMap[key].products.push(product);
        });

        return groups;
      };

      const filteredProducts = catalogProducts.filter(p => {
        const term = searchTerm.toLowerCase();
        const matchesSearch = p.item_name.toLowerCase().includes(term) ||
          p.display_name.toLowerCase().includes(term) ||
          p.short_name.toLowerCase().includes(term) ||
          p.catalog_category.toLowerCase().includes(term) ||
          p.item_number.toLowerCase().includes(term) ||
          p.model.toLowerCase().includes(term);

        const matchesWatt = selectedWatt === 'All' || (p.watt !== null && p.watt.toString() === selectedWatt);
        const matchesKelvin = selectedKelvin === 'All' || (p.kelvin !== null && p.kelvin === selectedKelvin);

        return matchesSearch && matchesWatt && matchesKelvin;
      });

      const groupedProducts = groupProductsByCategory(filteredProducts);
      const expandAllGroups = () => {
        setExpandedGroups(Object.fromEntries(groupedProducts.map(group => [group.key, true])));
      };
      const collapseAllGroups = () => {
        setExpandedGroups({});
      };
      const collapseGroup = (groupKey, preserveScroll = false) => {
        const scrollY = window.scrollY;
        setExpandedGroups(current => ({
          ...current,
          [groupKey]: false,
        }));
        if (preserveScroll) {
          requestAnimationFrame(() => {
            requestAnimationFrame(() => window.scrollTo({ top: scrollY, behavior: 'auto' }));
          });
        }
      };
      const toggleGroup = (groupKey) => {
        setExpandedGroups(current => ({
          ...current,
          [groupKey]: current[groupKey] !== true,
        }));
      };
      const isGroupExpanded = (groupKey) => expandedGroups[groupKey] === true;

      const getProductWattLabel = (product) => (
        product.watt_text || (product.watt !== null ? `${product.watt} وات` : '')
      );

      const getProductLumenLabel = (product) => (
        product.lumen && product.lumen !== '-' ? product.lumen : ''
      );

      const formatProductShareText = (product) => [
        `كود المنتج: ${product.item_number}`,
        `اسم المنتج: ${product.item_name}`,
        `رقم الموديل: ${product.model || ''}`,
        `الوات: ${getProductWattLabel(product)}`,
        `اللون: ${product.kelvin || ''}`,
        `اللومن: ${getProductLumenLabel(product)}`,
        `المواصفات الفنية: ${product.technical_specs}`,
        `ميزات إضافية: ${product.features}`,
      ].filter(Boolean).join('\n');

      const copyOrShareProduct = async (product) => {
        const text = formatProductShareText(product);
        if (navigator.share) {
          try {
            await navigator.share({ title: product.item_name, text });
            return;
          } catch (error) {
            if (error.name === 'AbortError') return;
          }
        }
        await navigator.clipboard.writeText(text);
      };

      const escapeXml = (value) => String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');

      const encodeUtf8 = (value) => new TextEncoder().encode(value);

      const concatBytes = (parts) => {
        const totalLength = parts.reduce((total, part) => total + part.length, 0);
        const output = new Uint8Array(totalLength);
        let offset = 0;
        parts.forEach(part => {
          output.set(part, offset);
          offset += part.length;
        });
        return output;
      };

      const uint16 = (value) => {
        const bytes = new Uint8Array(2);
        new DataView(bytes.buffer).setUint16(0, value, true);
        return bytes;
      };

      const uint32 = (value) => {
        const bytes = new Uint8Array(4);
        new DataView(bytes.buffer).setUint32(0, value >>> 0, true);
        return bytes;
      };

      const crcTable = (() => {
        const table = new Uint32Array(256);
        for (let i = 0; i < 256; i += 1) {
          let crc = i;
          for (let j = 0; j < 8; j += 1) {
            crc = (crc & 1) ? (0xedb88320 ^ (crc >>> 1)) : (crc >>> 1);
          }
          table[i] = crc >>> 0;
        }
        return table;
      })();

      const crc32 = (bytes) => {
        let crc = 0xffffffff;
        for (let i = 0; i < bytes.length; i += 1) {
          crc = crcTable[(crc ^ bytes[i]) & 0xff] ^ (crc >>> 8);
        }
        return (crc ^ 0xffffffff) >>> 0;
      };

      const createZipArchive = (files) => {
        const localParts = [];
        const centralParts = [];
        let offset = 0;

        files.forEach(file => {
          const nameBytes = encodeUtf8(file.name);
          const dataBytes = encodeUtf8(file.content);
          const crc = crc32(dataBytes);
          const localHeader = concatBytes([
            uint32(0x04034b50), uint16(20), uint16(0), uint16(0), uint16(0), uint16(0),
            uint32(crc), uint32(dataBytes.length), uint32(dataBytes.length),
            uint16(nameBytes.length), uint16(0), nameBytes,
          ]);
          const centralHeader = concatBytes([
            uint32(0x02014b50), uint16(20), uint16(20), uint16(0), uint16(0), uint16(0), uint16(0),
            uint32(crc), uint32(dataBytes.length), uint32(dataBytes.length),
            uint16(nameBytes.length), uint16(0), uint16(0), uint16(0), uint16(0),
            uint32(0), uint32(offset), nameBytes,
          ]);

          localParts.push(localHeader, dataBytes);
          centralParts.push(centralHeader);
          offset += localHeader.length + dataBytes.length;
        });

        const centralDirectory = concatBytes(centralParts);
        const endRecord = concatBytes([
          uint32(0x06054b50), uint16(0), uint16(0), uint16(files.length), uint16(files.length),
          uint32(centralDirectory.length), uint32(offset), uint16(0),
        ]);

        return concatBytes([...localParts, centralDirectory, endRecord]);
      };

      const getExcelColumnName = (index) => {
        let name = '';
        let current = index + 1;
        while (current > 0) {
          const remainder = (current - 1) % 26;
          name = String.fromCharCode(65 + remainder) + name;
          current = Math.floor((current - 1) / 26);
        }
        return name;
      };

      const createWorksheetXml = (rows) => {
        const sheetRows = rows.map((row, rowIndex) => {
          const rowNumber = rowIndex + 1;
          const cells = row.map((cell, columnIndex) => {
            const cellRef = `${getExcelColumnName(columnIndex)}${rowNumber}`;
            return `<c r="${cellRef}" t="inlineStr"><is><t>${escapeXml(cell)}</t></is></c>`;
          }).join('');
          return `<row r="${rowNumber}">${cells}</row>`;
        }).join('');

        return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
          <worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">
            <sheetViews><sheetView workbookViewId="0" rightToLeft="1"/></sheetViews>
            <cols>

      };

            <Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
              <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
              <Default Extension="xml" ContentType="application/xml"/>
              <Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>
              <Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>
              <Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/>
            </Types>`,
        },
        {
          name: '_rels/.rels',
          content: `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
            <Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
              <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/>
            </Relationships>`,
        },

          name: 'xl/workbook.xml',
          content: `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
            <workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
              <workbookViews><workbookView rightToLeft="1"/></workbookViews>

          content: `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
            <Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">

              <Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>
